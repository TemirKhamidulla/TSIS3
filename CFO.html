<!DOCTYPE html>
<html>
<head>
<title>CFO Bot</title>
<style>
body { font-family: Arial; max-width: 600px; margin: 40px auto; }
input, select { margin: 5px 0; padding: 5px; width: 100%; }
button { padding: 10px; margin-top: 10px; }
.result { margin-top: 20px; font-weight: bold; }
</style>
</head>
<body>

<h2>CFO Bot – Cloud Cost Calculator</h2>

<label>Compute Type</label>
<select id="compute">
<option value="0.05">Small</option>
<option value="0.10">Medium</option>
<option value="0.20">Large</option>
</select>

<label>Storage (GB)</label>
<input type="number" id="storage" value="0">

<label>Bandwidth (GB)</label>
<input type="number" id="bandwidth" value="0">

<label>Database Tier</label>
<select id="database">
<option value="30">Dev</option>
<option value="100">Production</option>
<option value="300">Enterprise</option>
</select>

<button onclick="calculate()">Calculate</button>

<div class="result" id="result"></div>

<script>
function calculate() {
let computeRate = parseFloat(document.getElementById("compute").value);
let storage = parseFloat(document.getElementById("storage").value);
let bandwidth = parseFloat(document.getElementById("bandwidth").value);
let database = parseFloat(document.getElementById("database").value);

let computeCost = computeRate * 730;
let storageCost = storage * 0.10;

let bandwidthCost = 0;
if (bandwidth <= 100) {
    bandwidthCost = bandwidth * 0.12;
} else if (bandwidth <= 1000) {
    bandwidthCost = (100 * 0.12) + ((bandwidth - 100) * 0.10);
} else {
    bandwidthCost = (100 * 0.12) + (900 * 0.10) + ((bandwidth - 1000) * 0.08);
}

let total = computeCost + storageCost + bandwidthCost + database;

document.getElementById("result").innerHTML =
"Compute: $" + computeCost.toFixed(2) + "<br>" +
"Storage: $" + storageCost.toFixed(2) + "<br>" +
"Bandwidth: $" + bandwidthCost.toFixed(2) + "<br>" +
"Database: $" + database.toFixed(2) + "<br><br>" +
"Total Monthly Cost: $" + total.toFixed(2);
}
</script>

</body>
</html>
